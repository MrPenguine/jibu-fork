version: '3.8'

services:
  worker:
    build:
      context: ../..
      dockerfile: apps/worker/Dockerfile
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - N8N_API_URL=http://n8n:5678/api/v1
      - N8N_API_KEY=${N8N_API_KEY}
      - N8N_WORKER_CONCURRENCY=5
      - ENABLE_WORKER_SCALING=true
      - N8N_MIN_WORKERS=1
      - N8N_MAX_WORKERS=10
    depends_on:
      - redis
      - n8n
    restart: unless-stopped
    networks:
      - jibu-network

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - jibu-network

  n8n:
    image: n8nio/n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_HOST=n8n
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - DB_TYPE=sqlite
      - DB_SQLITE_PATH=/home/node/.n8n/database.sqlite
    volumes:
      - n8n-data:/home/node/.n8n
    restart: unless-stopped
    networks:
      - jibu-network

volumes:
  redis-data:
  n8n-data:

networks:
  jibu-network:
    driver: bridge
