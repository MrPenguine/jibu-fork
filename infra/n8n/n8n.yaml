# n8n Configuration
# This is a minimal configuration file for n8n
# All sensitive values should be passed via environment variables

general:
  # Base path where n8n is deployed
  baseUrl: http://localhost:5678
  
  # Security
  encryptionKey: ${N8N_ENCRYPTION_KEY:your-encryption-key}
  
  # Logging
  logLevel: info
  logOutput: console

security:
  # Basic Auth (enable and configure via environment variables if needed)
  basicAuth:
    active: ${N8N_BASIC_AUTH_ACTIVE:false}
    user: ${N8N_BASIC_AUTH_USER:}
    password: ${N8N_BASIC_AUTH_PASSWORD:}

# Execution settings
executions:
  # Process mode (own, main)
  process: ${EXECUTIONS_PROCESS:main}
  
  # Timeouts in seconds
  timeout: ${EXECUTIONS_TIMEOUT:3600}
  timeoutMax: ${EXECUTIONS_TIMEOUT_MAX:36000}

# Webhook configuration
webhook:
  url: ${N8N_HOST:localhost}:${N8N_PORT:5678}
  path: /
  retryAttempts: 5
  waitForRegistration: true
  waitForWebhooksTimeout: 10000
  
